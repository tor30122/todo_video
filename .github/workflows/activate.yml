name: Aktiver oppgavene
on: workflow_dispatch

permissions:
  contents: write
  actions: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Slett denne workflowen og push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/activate.yml
          git commit -m "Aktiver oppgaver"
          git push

      - name: Start oppsett
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run setup.yml
